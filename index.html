window.enterMoveMode = function() {
  if (!selectedUnit || selectedUnit.movesLeft <= 0) return;
  moveMode = true; buyTileMode = false; reachableTiles.clear();
  const u = selectedUnit;
  const start = u.y * MAP_COLS + u.x;
  const visited = new Map(); visited.set(start, 0);
  const queue = [{ key: start, dist: 0 }];
  while (queue.length > 0) {
    const { key, dist } = queue.shift();
    const cx = key % MAP_COLS, cy = Math.floor(key / MAP_COLS);
    for (const nb of hexNeighbors(cx, cy)) {
      const nx = nb.col, ny = nb.row;
      if (nx < 0 || nx >= MAP_COLS || ny < 0 || ny >= MAP_ROWS) continue;
      const nk = ny * MAP_COLS + nx;
      if (!unitCanTraverse(u.type, tiles[nk].type, u.nationId, nx, ny)) continue;
      const nd = dist + 1;
      if (nd > u.movesLeft) continue;
      if (visited.has(nk) && visited.get(nk) <= nd) continue;
      if (units.some(o => o.x === nx && o.y === ny && o !== u && o.nationId === u.nationId)) continue;
      visited.set(nk, nd);
      reachableTiles.add(nk);
      queue.push({ key: nk, dist: nd });
    }
  }
  if (UNIT_DEFS[u.type].combat) {
    for (const enemy of units) {
      if (enemy.nationId === u.nationId) continue;
      if (nations[u.nationId].relations[enemy.nationId] !== 'war') continue;
      const dist = Math.abs(enemy.x - u.x) + Math.abs(enemy.y - u.y);
      if (dist <= u.movesLeft) reachableTiles.add(enemy.y * MAP_COLS + enemy.x);
    }
  }
  render();
};

// ====================
// SAVE / LOAD
// ====================
function serializeGame() {
  // Convert tile revealed Sets to arrays
  const sTiles = tiles.map(t => ({
    type: t.type, color: t.color, baseColor: t.baseColor, owner: t.owner,
    improvement: t.improvement, revealed: [...t.revealed], spriteKey: t.spriteKey,
  }));
  const sCities = cities.map(c => ({
    x: c.x, y: c.y, name: c.name, nationId: c.nationId,
    producing: c.producing, productionProgress: c.productionProgress,
    ownedTiles: [...c.ownedTiles],
    captureProgress: c.captureProgress || {}, contested: c.contested || false,
  }));
  const sNations = nations.map(n => ({ ...n, researched: [...(n.researched || [])] }));
  return JSON.stringify({
    v: 4, MAP_COLS, MAP_ROWS, tiles: sTiles, nations: sNations, units, cities: sCities,
    playerNation, turnNumber, camX, camY, VIEW_TILE, discoveredNations: [...discoveredNations],
  });
}

function deserializeGame(json) {
  const d = JSON.parse(json);
  if (!d.v || d.v < 2) { showToast('Incompatible save version'); return false; }
  MAP_COLS = d.MAP_COLS; MAP_ROWS = d.MAP_ROWS;
  tiles = d.tiles.map(t => ({ ...t, revealed: new Set(t.revealed), spriteKey: t.spriteKey || pickSprite(t.type, Math.floor(Math.random() * 997)) }));
  nations = d.nations.map(n => ({ ...n, researched: new Set(n.researched || []), science: n.science || 0 }));
  units = d.units;
  cities = d.cities.map(c => ({ ...c, ownedTiles: new Set(c.ownedTiles) }));
  playerNation = d.playerNation;
  turnNumber = d.turnNumber;
  camX = d.camX; camY = d.camY;
  VIEW_TILE = d.VIEW_TILE || 24;
  discoveredNations = new Set(d.discoveredNations || []);
  selectedUnit = null; selectedCity = null;
  moveMode = false; buyTileMode = false; reachableTiles.clear();
  return true;
}

function saveGame(slot) {
  slot = slot || 'auto';
  try {
    const data = serializeGame();
    const meta = { nation: nations[playerNation].name, turn: turnNumber, date: new Date().toLocaleString(), size: `${MAP_COLS}x${MAP_ROWS}` };
    localStorage.setItem('sis_save_' + slot, data);
    localStorage.setItem('sis_meta_' + slot, JSON.stringify(meta));
    return true;
  } catch (e) {
    console.error('Save failed:', e);
    showToast('Save failed! Storage may be full.');
    return false;
  }
}

function autoSave() {
  try { saveGame('auto'); } catch(e) {}
}

function loadGame(slot) {
  const data = localStorage.getItem('sis_save_' + slot);
  if (!data) { showToast('No save found'); return; }
  document.getElementById('menu').style.display = 'none';
  document.getElementById('game').style.display = 'block';
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  viewCols = Math.ceil(canvas.width / hexColStep()) + 3;
  viewRows = Math.ceil(canvas.height / hexCellH()) + 3;
  if (deserializeGame(data)) {
    hidePanel();
    document.getElementById('kingdoms').style.display = 'none';
    showToast('Game loaded!');
    startMusic();
    render(); updateUI();
  }
}

function deleteSave(slot) {
  localStorage.removeItem('sis_save_' + slot);
  localStorage.removeItem('sis_meta_' + slot);
  refreshSaveSlots();
}

function refreshSaveSlots() {
  const el = document.getElementById('saveSlots');
  let html = '';
  const slots = ['auto', 'slot1', 'slot2', 'slot3'];
  const labels = ['Auto Save', 'Save Slot 1', 'Save Slot 2', 'Save Slot 3'];
  for (let i = 0; i < slots.length; i++) {
    const meta = localStorage.getItem('sis_meta_' + slots[i]);
    if (meta) {
      const m = JSON.parse(meta);
      html += `<button class="menu-btn save-slot" onclick="loadGame('${slots[i]}')">${labels[i]} - Load<span class="slot-info">${m.nation} | Turn ${m.turn} | ${m.size} | ${m.date}</span></button>`;
    }
  }
  if (!html) html = '<p style="color:#666;font-size:14px;text-align:center">No saved games</p>';
  el.innerHTML = html;
}

window.saveGame = saveGame;
window.loadGame = loadGame;
window.deleteSave = deleteSave;

function findLandNear(cx, cy, radius) {
  for (let r = 0; r <= radius; r++) for (let dy = -r; dy <= r; dy++) for (let dx = -r; dx <= r; dx++) {
    if (Math.abs(dx) + Math.abs(dy) > r) continue;
    const tx = cx + dx, ty = cy + dy;
    if (tx < 0 || tx >= MAP_COLS || ty < 0 || ty >= MAP_ROWS) continue;
    const t = tiles[ty * MAP_COLS + tx].type;
    if (t === 1 || t === 3 || t === 5 || t === 6) return { x: tx, y: ty };
  }
  for (let i = 0; i < tiles.length; i++) if (tiles[i].type === 1) return { x: i % MAP_COLS, y: Math.floor(i / MAP_COLS) };
  return { x: cx, y: cy };
}

function spawnAINations(count) {
  const usedNames = new Set([nations[playerNation].name]);
  for (let i = 0; i < count; i++) {
    let name;
    do { name = NATION_NAMES[Math.floor(Math.random() * NATION_NAMES.length)]; } while (usedNames.has(name));
    usedNames.add(name);
    const nId = createNation(name, randomColor(), false);
    nations[playerNation].relations[nId] = 'peace'; nations[nId].relations[playerNation] = 'peace';
    nations[playerNation].loyalty[nId] = 50; nations[nId].loyalty[playerNation] = 50;
    for (let j = 0; j < nId; j++) {
      nations[j].relations[nId] = 'peace'; nations[nId].relations[j] = 'peace';
      nations[j].loyalty[nId] = 50; nations[nId].loyalty[j] = 50;
    }
    let attempts = 0, sp;
    do {
      sp = findLandNear(Math.floor(Math.random() * MAP_COLS), Math.floor(Math.random() * MAP_ROWS), 10);
      attempts++;
    } while (attempts < 50 && units.some(u => Math.abs(u.x - sp.x) + Math.abs(u.y - sp.y) < 15));
    const settler = spawnUnit('settler', nId, sp.x, sp.y);
    const aiCity = foundCity(settler);
    aiCity.producing = 'settler';
    for (const uType of ['worker', 'swordsman', 'scout']) {
      const wp = findLandNear(sp.x + Math.floor(Math.random()*3)-1, sp.y + Math.floor(Math.random()*3)-1, 5);
      spawnUnit(uType, nId, wp.x, wp.y);
    }
  }
}

function startGame(cols, rows, pName, pColor, opponents) {
  MAP_COLS = cols; MAP_ROWS = rows;
  document.getElementById('menu').style.display = 'none';
  document.getElementById('game').style.display = 'block';
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  viewCols = Math.ceil(canvas.width / hexColStep()) + 3;
  viewRows = Math.ceil(canvas.height / hexCellH()) + 3;
  generateAndPlay(pName, pColor, opponents);
  startMusic();
}

function generateAndPlay(pName, pColor, opponents) {
  generateMap();
  pName = pName || NATION_NAMES[Math.floor(Math.random() * NATION_NAMES.length)];
  pColor = pColor || '#4488cc';
  playerNation = createNation(pName, pColor, true);

  // Spawn in the middle of the map
  const rx = Math.floor(MAP_COLS / 2);
  const ry = Math.floor(MAP_ROWS / 2);
  const sp = findLandNear(rx, ry, 20);

  // Spawn settler, found city, spawn starting units
  const settlerUnit = spawnUnit('settler', playerNation, sp.x, sp.y);
  const startCity = foundCity(settlerUnit);
  startCity.producing = 'settler';
  for (const uType of ['swordsman', 'scout', 'worker']) {
    const lp = findLandNear(sp.x + Math.floor(Math.random()*3)-1, sp.y + Math.floor(Math.random()*3)-1, 4);
    spawnUnit(uType, playerNation, lp.x, lp.y);
  }

  // Zoom in and center camera on spawn
  VIEW_TILE = 32;
  viewCols = Math.ceil(canvas.width / hexColStep()) + 3;
  viewRows = Math.ceil(canvas.height / hexCellH()) + 3;
  const cx = Math.floor(viewCols / 2), cy = Math.floor(viewRows / 2);
  camX = Math.max(0, Math.min(MAP_COLS - viewCols + 1, sp.x - cx));
  camY = Math.max(0, Math.min(MAP_ROWS - viewRows + 1, sp.y - cy));
  revealAllUnits(playerNation);

  const aiCount = opponents || Math.max(1, Math.min(4, Math.floor(MAP_COLS * MAP_ROWS / 3000)));
  spawnAINations(aiCount);

  selectedUnit = null; selectedCity = null;
  moveMode = false; reachableTiles.clear(); buyTileMode = false;
  hidePanel();
  document.getElementById('kingdoms').style.display = 'none';
  updateUI(); render();
  showToast(`You are ${pName}. Found your empire!`);
}

window.addEventListener('resize', () => {
  if (!MAP_COLS) return;
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  viewCols = Math.ceil(canvas.width / hexColStep()) + 3;
  viewRows = Math.ceil(canvas.height / hexCellH()) + 3;
  render();
});

// Init save slots on load
refreshSaveSlots();

// Start music on first user interaction (browsers block autoplay)
let musicStarted = false;
document.addEventListener('click', function initMusic() {
  if (!musicStarted && musicEnabled) {
    bgMusic.play().catch(() => {});
    musicStarted = true;
  }
}, { once: false });

// Global: play hover sound on ANY button mouseenter, click sound on ANY button click
document.addEventListener('mouseover', (e) => {
  const btn = e.target.closest('button, .menu-btn, .p-btn, .top-btn, .esc-btn, .diplo-btn, .tab-btn');
  if (btn) playHover();
});
document.addEventListener('click', (e) => {
  const btn = e.target.closest('button, .menu-btn, .p-btn, .top-btn, .esc-btn, .diplo-btn, .tab-btn');
  if (btn) playClick();
});
</script>
</body>
</html>
